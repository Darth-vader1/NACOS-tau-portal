<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Admin Login - NACOS</title>
  <meta name="description" content="NACOS Admin Portal">
  <meta name="keywords" content="">

  <link href="assets/img/tau_logo-removebg-preview.png" rel="icon">
  <link href="assets/img/tau_logo-removebg-preview.png" rel="apple-touch-icon">

  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Nunito:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="assets/css/main.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-config.js"></script>

  <style>
    .toggle-password {
      position: absolute;
      right: 10px;
      top: 65%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    .password-container {
      position: relative;
    }
    .admin-badge {
      background: linear-gradient(135deg, #1b8c0c 0%, #2d9b0f 100%);
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .login-container {
      max-width: 450px;
      margin: 0 auto;
    }
    .login-card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body class="starter-page-page">

  <header id="header" class="header d-flex align-items-center fixed-top">
    <div class="container-fluid container-xl position-relative d-flex align-items-center" style="width: 100%; display: flex; justify-content: space-around;">
      <a href="index.html" class="logo d-flex align-items-center me-auto">
        <img src="assets/img/nacos logo.jpg" alt="">
        <h1 class="sitename"><span style="color: #1b8c0c;">NACOS</span><br><strong style="font-size: 14px;">Thomas Adewumi University</strong></h1>
      </a>
    </div>
  </header>

  <main class="main">
    <section id="starter-section" class="starter-section section" style="padding-top: 100px;">
      <div class="container login-container" data-aos="fade-up">
        <div class="login-card card p-4">
          <div class="text-center mb-4">
            <span class="admin-badge">Admin Portal</span>
            <img src="assets/img/tau_logo-removebg-preview.png" class="logo-underlay mt-3" alt="" style="max-width: 80px;">
          </div>

          <div class="section-title">
            <h2>Sign In</h2>
            <p>Enter admin credentials to manage content</p>
          </div>

          <form id="adminLoginForm">
            <div class="form-group mb-3">
              <label for="email">Admin Email</label>
              <input type="email" class="form-control" id="email" placeholder="Enter admin email" required>
            </div>

            <div class="form-group mb-3 password-container">
              <label for="password">Password</label>
              <input type="password" class="form-control" id="password" placeholder="Enter password" required>
              <button type="button" id="toggle-password" class="toggle-password">
                <i class="bi bi-eye-slash"></i>
              </button>
            </div>

            <button type="submit" class="btn btn-primary w-100" style="background-color: #1b8c0c; border-color: #1b8c0c;">
              Sign In
            </button>
          </form>

          <div class="text-center mt-3">
            <a href="student-login.html">Student Login</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const passwordInput = document.getElementById('password');
      const togglePassword = document.getElementById('toggle-password');

      togglePassword.addEventListener('click', function() {
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          togglePassword.innerHTML = '<i class="bi bi-eye"></i>';
        } else {
          passwordInput.type = 'password';
          togglePassword.innerHTML = '<i class="bi bi-eye-slash"></i>';
        }
      });

      document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        try {
          const supabase = getSupabase();
          const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password
          });

          if (error) {
            Swal.fire({
              title: 'Error!',
              text: 'Invalid admin credentials',
              icon: 'error',
              confirmButtonText: 'OK'
            });
            return;
          }

          const { data: adminData, error: adminError } = await supabase
            .from('admin_users')
            .select('*')
            .eq('user_id', data.user.id)
            .single();

          if (adminError || !adminData) {
            await supabase.auth.signOut();
            Swal.fire({
              title: 'Access Denied',
              text: 'You are not authorized as an admin',
              icon: 'error',
              confirmButtonText: 'OK'
            });
            return;
          }

          sessionStorage.setItem('adminSession', JSON.stringify({
            userId: data.user.id,
            adminId: adminData.id
          }));

          Swal.fire({
            title: 'Success!',
            text: 'Welcome to the admin panel',
            icon: 'success',
            confirmButtonText: 'OK'
          }).then(() => {
            window.location.href = 'admin-dashboard.html';
          });

        } catch (err) {
          Swal.fire({
            title: 'Error!',
            text: 'An error occurred. Please try again.',
            icon: 'error',
            confirmButtonText: 'OK'
          });
        }
      });
    });
  </script>

</body>
</html>
